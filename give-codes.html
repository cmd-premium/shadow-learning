<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Give codes – Shadow Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, sans-serif;
      background: #030406;
      color: #f4f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #080b10;
      border-radius: 20px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.08), 0 24px 48px rgba(0, 0, 0, 0.4);
    }
    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(34, 211, 238, 0.9);
      margin-bottom: 8px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .desc {
      font-size: 0.9rem;
      color: #8b95a8;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .code-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.6);
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(148, 163, 184, 0.08);
    }
    .code-value {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      font-variant-numeric: tabular-nums;
    }
    .copy-btn {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      background: rgba(34, 211, 238, 0.2);
      color: #22d3ee;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .copy-btn:hover {
      background: rgba(34, 211, 238, 0.35);
    }
    .copy-btn:active {
      transform: scale(0.98);
    }
    .copy-btn.copied {
      background: rgba(34, 197, 94, 0.25);
      color: #4ade80;
    }
    .foot {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="badge">Staff</p>
    <h1>Give codes</h1>
    <p class="desc">{{MESSAGE}}</p>
    <div class="code-row">
      <span class="code-value" data-code="{{CODE}}">{{CODE}}</span>
      <button type="button" class="copy-btn" data-code="{{CODE}}" aria-label="Copy {{CODE}}">Copy</button>
    </div>
    <p class="foot">User enters the code on the main site to unlock. Each code can only be used on one device.</p>
  </div>
  <script>
    document.querySelectorAll(".copy-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var code = this.getAttribute("data-code");
        var label = this.textContent;
        navigator.clipboard.writeText(code).then(
          function () {
            btn.textContent = "Copied";
            btn.classList.add("copied");
            setTimeout(function () {
              btn.textContent = label;
              btn.classList.remove("copied");
            }, 1500);
          },
          function () {
            btn.textContent = "Failed";
            setTimeout(function () { btn.textContent = label; }, 1500);
          }
        );
      });
    });
  </script>
</body>
</html>
