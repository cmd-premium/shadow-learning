<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get your access code – Shadow Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, sans-serif;
      background: #030406;
      color: #f4f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #080b10;
      border-radius: 20px;
      padding: 32px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.08);
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .desc {
      font-size: 0.9rem;
      color: #8b95a8;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.6);
      color: #f4f5f9;
      font-family: inherit;
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: rgba(34, 211, 238, 0.25);
      color: #22d3ee;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover {
      background: rgba(34, 211, 238, 0.4);
    }
    .error {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Get your access code</h1>
    <p class="desc">Enter your license code to receive a code for the website.</p>
    <form method="post" action="/give-codes">
      <input type="text" name="key" placeholder="License code" autocomplete="off" required />
      <button type="submit">Continue</button>
    </form>
    <p class="error" id="error" hidden></p>
  </div>
</body>
</html>
