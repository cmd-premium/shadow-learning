<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow Learning</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='fg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2322d3ee'/><stop offset='100%25' stop-color='%23a78bfa'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='%23050810'/><text x='16' y='22' font-size='16' text-anchor='middle' font-weight='bold' font-family='system-ui,sans-serif' fill='url(%23fg)'>S</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="style.css" />
    <style>
      body.emulator-body { margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
      .emulator-bar { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); }
      .emulator-back { font-size: 14px; font-weight: 600; color: var(--accent); text-decoration: none; }
      .emulator-back:hover { color: var(--accent-2); }
      .emulator-frame-wrap { flex: 1; min-height: 0; position: relative; }
      .emulator-frame-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: block; }
    </style>
  </head>
  <body class="emulator-body">
    <div class="emulator-bar">
      <a href="index.html" class="emulator-back" aria-label="Back to Play">← Back to Play</a>
    </div>
    <div class="emulator-frame-wrap">
      <iframe
        id="emulator-frame"
        src="/browse?u=https%3A%2F%2Fclassicgamezone.com%2F"
        title="Classic Game Zone"
        allow="fullscreen"
        allowfullscreen
      ></iframe>
    </div>
    <script>
      (function() {
        var frame = document.getElementById("emulator-frame");
        if (!frame) return;
        if (location.protocol === "file:") {
          frame.src = "https://classicgamezone.com/";
        } else {
          frame.src = location.origin + "/browse?u=" + encodeURIComponent("https://classicgamezone.com/");
        }
      })();
    </script>
  </body>
</html>
