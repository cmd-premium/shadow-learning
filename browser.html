<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser – Shadow Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      font-family: "Outfit", system-ui, sans-serif;
      background: #0a0c10;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .browser-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #0f1218;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      flex-shrink: 0;
    }
    .browser-bar .addr-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .browser-bar input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 10px 14px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      background: #151922;
      color: #e2e8f0;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
    }
    .browser-bar input[type="text"]:focus {
      outline: none;
      border-color: #22d3ee;
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.2);
    }
    .browser-bar .go-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: rgba(34, 211, 238, 0.25);
      color: #22d3ee;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .browser-bar .go-btn:hover {
      background: rgba(34, 211, 238, 0.4);
    }
    .tabs-wrap {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 8px 12px 0;
      background: #0f1218;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(21, 25, 34, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      max-width: 180px;
      min-width: 100px;
      flex-shrink: 0;
    }
    .tab.active {
      background: #151922;
      border-color: rgba(34, 211, 238, 0.3);
      color: #22d3ee;
    }
    .tab .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.85rem;
    }
    .tab .tab-close {
      width: 20px;
      height: 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .tab .tab-close:hover {
      background: rgba(248, 113, 113, 0.2);
      color: #f87171;
    }
    .tab-new {
      padding: 10px 14px;
      border: 1px dashed rgba(148, 163, 184, 0.3);
      border-radius: 10px 10px 0 0;
      background: transparent;
      color: #64748b;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .tab-new:hover {
      border-color: #22d3ee;
      color: #22d3ee;
    }
    .frame-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    .frame-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
    .frame-wrap iframe.hidden {
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="browser-bar">
    <div class="addr-wrap">
      <input type="text" id="addr" placeholder="Search or enter URL (runs via proxy)" spellcheck="false" />
      <button type="button" class="go-btn" id="go">Go</button>
    </div>
  </div>
  <div class="tabs-wrap" id="tabs-wrap">
    <!-- tabs injected by JS -->
  </div>
  <div class="frame-wrap" id="frame-wrap">
    <!-- iframes injected by JS -->
  </div>

  <script>
    (function () {
      const DEFAULT_URL = "https://duckduckgo.com/";
      const BROWSE_PREFIX = "/browse?u=";

      function encodeBrowseUrl(url) {
        try {
          const u = typeof url === "string" ? url.trim() : "";
          if (!u) return null;
          if (!/^https?:\/\//i.test(u)) return BROWSE_PREFIX + encodeURIComponent("https://duckduckgo.com/?q=" + encodeURIComponent(u));
          return BROWSE_PREFIX + encodeURIComponent(u);
        } catch (e) {
          return null;
        }
      }

      let tabs = [{ id: 1, url: DEFAULT_URL, title: "DuckDuckGo" }];
      let activeId = 1;
      let nextId = 2;

      const tabsWrap = document.getElementById("tabs-wrap");
      const frameWrap = document.getElementById("frame-wrap");
      const addrInput = document.getElementById("addr");
      const goBtn = document.getElementById("go");

      function renderTabs() {
        tabsWrap.innerHTML = "";
        tabs.forEach(function (t) {
          const tabEl = document.createElement("button");
          tabEl.className = "tab" + (t.id === activeId ? " active" : "");
          tabEl.setAttribute("data-tab-id", t.id);
          tabEl.innerHTML = "<span class=\"tab-title\">" + escapeHtml(t.title) + "</span><button type=\"button\" class=\"tab-close\" aria-label=\"Close tab\">&times;</button>";
          tabEl.querySelector(".tab-close").addEventListener("click", function (e) {
            e.stopPropagation();
            closeTab(t.id);
          });
          tabEl.addEventListener("click", function (e) {
            if (e.target.classList.contains("tab-close")) return;
            setActiveTab(t.id);
          });
          tabsWrap.appendChild(tabEl);
        });
        const newBtn = document.createElement("button");
        newBtn.type = "button";
        newBtn.className = "tab-new";
        newBtn.setAttribute("aria-label", "New tab");
        newBtn.textContent = "+";
        newBtn.addEventListener("click", newTab);
        tabsWrap.appendChild(newBtn);
      }

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function renderFrames() {
        frameWrap.innerHTML = "";
        tabs.forEach(function (t) {
          const iframe = document.createElement("iframe");
          iframe.id = "frame-" + t.id;
          iframe.title = t.title;
          iframe.className = t.id === activeId ? "" : "hidden";
          const browseUrl = encodeBrowseUrl(t.url);
          iframe.src = browseUrl || encodeBrowseUrl(DEFAULT_URL);
          frameWrap.appendChild(iframe);
        });
      }

      function setActiveTab(id) {
        activeId = id;
        const tab = tabs.find(function (t) { return t.id === id; });
        if (tab) addrInput.value = tab.url;
        renderTabs();
        frameWrap.querySelectorAll("iframe").forEach(function (f) {
          const fid = parseInt(f.id.replace("frame-", ""), 10);
          f.classList.toggle("hidden", fid !== id);
        });
      }

      function closeTab(id) {
        const idx = tabs.findIndex(function (t) { return t.id === id; });
        if (idx === -1) return;
        tabs.splice(idx, 1);
        if (tabs.length === 0) {
          newTab();
          return;
        }
        if (activeId === id) {
          const next = tabs[Math.min(idx, tabs.length - 1)];
          activeId = next.id;
          addrInput.value = next.url;
        } else if (tabs.findIndex(function (t) { return t.id === activeId; }) === -1) {
          activeId = tabs[0].id;
          addrInput.value = tabs[0].url;
        }
        renderTabs();
        renderFrames();
      }

      function newTab() {
        const t = { id: nextId++, url: DEFAULT_URL, title: "DuckDuckGo" };
        tabs.push(t);
        activeId = t.id;
        addrInput.value = t.url;
        renderTabs();
        renderFrames();
      }

      function navigateCurrentTab() {
        const url = addrInput.value.trim();
        const tab = tabs.find(function (t) { return t.id === activeId; });
        if (!tab) return;
        const toOpen = !url ? DEFAULT_URL : (/^https?:\/\//i.test(url) ? url : "https://duckduckgo.com/?q=" + encodeURIComponent(url));
        tab.url = toOpen;
        try {
          tab.title = new URL(toOpen).hostname || "New tab";
        } catch (e) {
          tab.title = "New tab";
        }
        const iframe = document.getElementById("frame-" + tab.id);
        if (iframe) iframe.src = encodeBrowseUrl(toOpen);
        renderTabs();
      }

      goBtn.addEventListener("click", navigateCurrentTab);
      addrInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") navigateCurrentTab();
      });

      renderTabs();
      renderFrames();
      addrInput.value = DEFAULT_URL;
    })();
  </script>
</body>
</html>
