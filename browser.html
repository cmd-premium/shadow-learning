<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadow Learning</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='fg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2322d3ee'/><stop offset='100%25' stop-color='%23a78bfa'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='%23050810'/><text x='16' y='22' font-size='16' text-anchor='middle' font-weight='bold' font-family='system-ui,sans-serif' fill='url(%23fg)'>S</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Browser page: use site theme variables */
    body.browser-page {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .browser-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .browser-back {
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      padding: 8px 0;
      transition: color 0.2s, opacity 0.2s;
    }
    .browser-back:hover {
      color: var(--accent-2);
      opacity: 0.9;
    }
    .browser-bar .addr-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .browser-bar input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 12px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(8, 12, 18, 0.6);
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .browser-bar input[type="text"]::placeholder {
      color: var(--muted);
    }
    .browser-bar input[type="text"]:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.25);
    }
    .browser-bar .go-btn {
      padding: 12px 22px;
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      background: rgba(34, 211, 238, 0.12);
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .browser-bar .go-btn:hover {
      background: rgba(34, 211, 238, 0.2);
      border-color: rgba(34, 211, 238, 0.5);
      color: var(--ink);
    }
    .tabs-wrap {
      display: flex;
      align-items: flex-end;
      gap: 0;
      padding: 0 20px 0;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px 10px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      max-width: 200px;
      min-width: 90px;
      flex-shrink: 0;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.2s, border-color 0.2s;
    }
    .tab:hover {
      color: var(--ink);
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .tab .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tab .tab-close {
      width: 20px;
      height: 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.2s, background 0.2s;
    }
    .tab .tab-close:hover {
      background: rgba(34, 211, 238, 0.12);
      color: var(--accent);
    }
    .tab-new {
      padding: 12px 16px 10px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--muted);
      font-size: 1.25rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .tab-new:hover {
      color: var(--accent);
    }
    .frame-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      background: var(--bg);
    }
    .frame-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }
    .frame-wrap iframe.hidden {
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body class="browser-page">
  <div class="browser-bar">
    <a href="index.html" class="browser-back" aria-label="Back to Play">← Back</a>
    <div class="addr-wrap">
      <input type="text" id="addr" placeholder="Search or enter any URL (proxied)" spellcheck="false" />
      <button type="button" class="go-btn" id="go">Go</button>
    </div>
  </div>
  <div class="tabs-wrap" id="tabs-wrap">
    <!-- tabs injected by JS -->
  </div>
  <div class="frame-wrap" id="frame-wrap">
    <!-- iframes injected by JS -->
  </div>

  <script>
    (function () {
      const DEFAULT_URL = "https://duckduckgo.com/";
      const BROWSE_PREFIX = "/browse?u=";

      function encodeBrowseUrl(url) {
        try {
          const u = typeof url === "string" ? url.trim() : "";
          if (!u) return null;
          if (!/^https?:\/\//i.test(u)) return BROWSE_PREFIX + encodeURIComponent("https://duckduckgo.com/?q=" + encodeURIComponent(u));
          return BROWSE_PREFIX + encodeURIComponent(u);
        } catch (e) {
          return null;
        }
      }

      let tabs = [{ id: 1, url: DEFAULT_URL, title: "DuckDuckGo" }];
      let activeId = 1;
      let nextId = 2;

      const tabsWrap = document.getElementById("tabs-wrap");
      const frameWrap = document.getElementById("frame-wrap");
      const addrInput = document.getElementById("addr");
      const goBtn = document.getElementById("go");

      function renderTabs() {
        tabsWrap.innerHTML = "";
        tabs.forEach(function (t) {
          const tabEl = document.createElement("button");
          tabEl.className = "tab" + (t.id === activeId ? " active" : "");
          tabEl.setAttribute("data-tab-id", t.id);
          tabEl.innerHTML = "<span class=\"tab-title\">" + escapeHtml(t.title) + "</span><button type=\"button\" class=\"tab-close\" aria-label=\"Close tab\">&times;</button>";
          tabEl.querySelector(".tab-close").addEventListener("click", function (e) {
            e.stopPropagation();
            closeTab(t.id);
          });
          tabEl.addEventListener("click", function (e) {
            if (e.target.classList.contains("tab-close")) return;
            setActiveTab(t.id);
          });
          tabsWrap.appendChild(tabEl);
        });
        const newBtn = document.createElement("button");
        newBtn.type = "button";
        newBtn.className = "tab-new";
        newBtn.setAttribute("aria-label", "New tab");
        newBtn.textContent = "+";
        newBtn.addEventListener("click", newTab);
        tabsWrap.appendChild(newBtn);
      }

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      function getUrlFromBrowseSrc(src) {
        if (!src || src.indexOf("/browse") === -1) return null;
        try {
          const u = new URL(src, location.origin);
          const param = u.searchParams.get("u") || u.searchParams.get("url") || u.searchParams.get("URL");
          return param ? decodeURIComponent(param) : null;
        } catch (e) {
          return null;
        }
      }

      function renderFrames() {
        frameWrap.innerHTML = "";
        tabs.forEach(function (t) {
          const iframe = document.createElement("iframe");
          iframe.id = "frame-" + t.id;
          iframe.title = t.title;
          iframe.className = t.id === activeId ? "" : "hidden";
          const browseUrl = encodeBrowseUrl(t.url);
          iframe.src = browseUrl || encodeBrowseUrl(DEFAULT_URL);
          iframe.addEventListener("load", function () {
            var tabId = parseInt(iframe.id.replace("frame-", ""), 10);
            var loc = (iframe.contentWindow && iframe.contentWindow.location && iframe.contentWindow.location.href) ? iframe.contentWindow.location.href : iframe.src;
            var resolved = getUrlFromBrowseSrc(loc);
            if (resolved) {
              var tab = tabs.find(function (x) { return x.id === tabId; });
              if (tab) {
                tab.url = resolved;
                try {
                  tab.title = new URL(resolved).hostname || "Page";
                } catch (e) {
                  tab.title = "Page";
                }
                if (tabId === activeId) addrInput.value = resolved;
                renderTabs();
              }
            }
          });
          frameWrap.appendChild(iframe);
        });
      }

      function setActiveTab(id) {
        activeId = id;
        const tab = tabs.find(function (t) { return t.id === id; });
        if (tab) addrInput.value = tab.url;
        renderTabs();
        frameWrap.querySelectorAll("iframe").forEach(function (f) {
          const fid = parseInt(f.id.replace("frame-", ""), 10);
          f.classList.toggle("hidden", fid !== id);
        });
      }

      function closeTab(id) {
        const idx = tabs.findIndex(function (t) { return t.id === id; });
        if (idx === -1) return;
        tabs.splice(idx, 1);
        if (tabs.length === 0) {
          newTab();
          return;
        }
        if (activeId === id) {
          const next = tabs[Math.min(idx, tabs.length - 1)];
          activeId = next.id;
          addrInput.value = next.url;
        } else if (tabs.findIndex(function (t) { return t.id === activeId; }) === -1) {
          activeId = tabs[0].id;
          addrInput.value = tabs[0].url;
        }
        renderTabs();
        renderFrames();
      }

      function newTab() {
        const t = { id: nextId++, url: DEFAULT_URL, title: "DuckDuckGo" };
        tabs.push(t);
        activeId = t.id;
        addrInput.value = t.url;
        renderTabs();
        renderFrames();
      }

      function navigateCurrentTab() {
        const url = addrInput.value.trim();
        const tab = tabs.find(function (t) { return t.id === activeId; });
        if (!tab) return;
        // If it's not a full URL, go to DuckDuckGo with the typed text as the search query
        const toOpen = !url
          ? DEFAULT_URL
          : /^https?:\/\//i.test(url)
            ? url
            : "https://duckduckgo.com/?q=" + encodeURIComponent(url);
        tab.url = toOpen;
        addrInput.value = toOpen;
        try {
          tab.title = new URL(toOpen).hostname || "New tab";
        } catch (e) {
          tab.title = "New tab";
        }
        const iframe = document.getElementById("frame-" + tab.id);
        if (iframe) iframe.src = encodeBrowseUrl(toOpen);
        renderTabs();
      }

      goBtn.addEventListener("click", navigateCurrentTab);
      addrInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") navigateCurrentTab();
      });

      renderTabs();
      renderFrames();
      addrInput.value = DEFAULT_URL;
    })();
  </script>
</body>
</html>
